syntax = "proto3";

package io.olake.server.iceberg.rpc;

option go_package = "iceberg/proto";
option java_outer_classname = "RecordIngest";

// ============================================
// Core Shared Messages
// ============================================
message SchemaField {
  string ice_type = 1;
  string key = 2;
}

message PartitionField {
  string field = 1;
  string transform = 2;
}

message TableConfig {
  string dest_table_name = 1;
  string namespace = 2;
  bool upsert = 3;
}

enum WriterMode {
  LEGACY = 0;
  ARROW = 1;
}

// ============================================
// Catalog Service (Stateless)
// ============================================
service CatalogService {
  rpc CheckConnection(CheckConnectionRequest) returns (CheckConnectionResponse);
  rpc DropTables(DropTablesRequest) returns (DropTablesResponse);
}

message CheckConnectionRequest {
  string namespace = 1;
  string table_name = 2;
}
message CheckConnectionResponse {
  string result = 1;
}

message DropTablesRequest {
  repeated string tables = 1; // "namespace.table"
}
message DropTablesResponse {
  string result = 1;
}

// ============================================
// Unified Writer Service
// ============================================
service WriterService {
  rpc InitSession(InitSessionRequest) returns (InitSessionResponse);
  
  // Row methods
  rpc SendRecords(SendRecordsRequest) returns (SendRecordsResponse);
  rpc EvolveSchema(EvolveSchemaRequest) returns (EvolveSchemaResponse);
  rpc RefreshTableSchema(RefreshTableSchemaRequest) returns (RefreshTableSchemaResponse);
  
  // Arrow methods
  rpc GetFilePath(GetFilePathRequest) returns (GetFilePathResponse);
  rpc UploadFile(UploadFileRequest) returns (UploadFileResponse);
  
  // Common methods
  rpc Commit(CommitRequest) returns (CommitResponse);
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);
}

message InitSessionRequest {
  string thread_id = 1;
  TableConfig table_config = 2;
  WriterMode mode = 3;
  
  // Legacy writer: schema + partition spec. Identifier field (_olake_id) is set on the
  // JVM when table_config.upsert is true; append mode creates tables without identifiers.
  repeated SchemaField schema = 4;
  repeated PartitionField partition_fields = 5;
}

message InitSessionResponse {
  string result = 1;
  string olake_2pc_state = 2; // For row
  string schema_json = 3; // For row
  map<string, string> icebergSchemas = 4; // For arrow
}

message SendRecordsRequest {
  string thread_id = 1;
  repeated SchemaField schema = 2;
  
  message FieldValue {
    oneof value {
      string string_value = 1;
      int32 int_value = 2;
      int64 long_value = 3;
      float float_value = 4;
      double double_value = 5;
      bool bool_value = 6;
      bytes bytes_value = 7;
    }
  }
  
  message IceRecord {
    repeated FieldValue fields = 1;
    string record_type = 2; // "u", "c", "r"
  }
  
  repeated IceRecord records = 3;
}

message SendRecordsResponse {
  string result = 1;
}

message EvolveSchemaRequest {
  string thread_id = 1;
  repeated SchemaField schema = 2;
}

message EvolveSchemaResponse {
  string result = 1;
  string schema_json = 2;
}

message RefreshTableSchemaRequest {
  string thread_id = 1;
}

message RefreshTableSchemaResponse {
  string result = 1;
  string schema_json = 2;
}

message GetFilePathRequest {
  string thread_id = 1;
}

message GetFilePathResponse {
  string result = 1;
}

message UploadFileRequest {
  string thread_id = 1;
  string file_path = 2;
  bytes file_data = 3;
}

message UploadFileResponse {
  string result = 1;
}

message CommitRequest {
  string thread_id = 1;
  string payload = 2;
  
  // For arrow
  message PartitionValue {
    oneof value {
      int32 int_value = 1;
      int64 long_value = 2;
      string string_value = 3;
      float float_value = 4;
      double double_value = 5;
      bool bool_value = 6;
    }
  }

  message FileMetadata {
    string file_type = 1;
    string file_path = 2;
    int64 record_count = 3;
    repeated PartitionValue partition_values = 5;
  }
  
  repeated FileMetadata file_metadata = 3;
}

message CommitResponse {
  string result = 1;
}

message CloseSessionRequest {
  string thread_id = 1;
}

message CloseSessionResponse {
  string result = 1;
}
