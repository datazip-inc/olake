name: Go Security CI

on:
  push:
    branches:
      - "master"
    paths:
      - '**/*.go'
      - '**/*.java'
      - '**/go.mod'
  pull_request:
    branches:
      - "*"
    paths:
      - '**/*.go'
      - '**/*.java'
      - '**/go.mod'
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version-file: "go.mod"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run vulnerability checks
        run: |
          # govulncheck has no native ignore file; we read .govulnignore manually.
          # Lines prefixed with '#' are comments; blank lines are skipped.
          EXEMPT=$(grep -v '^\s*#' .govulnignore | grep -v '^\s*$' | paste -sd '|')
          set +e
          govulncheck -json ./... > /tmp/govuln.json 2>&1
          GOVULN_EXIT=$?
          set -e
          if [ "$GOVULN_EXIT" -eq 0 ]; then
            echo "No vulnerabilities found."
            exit 0
          fi
          REMAINING=$(grep -o '"GO-[0-9-]*"' /tmp/govuln.json | tr -d '"' | sort -u | grep -vE "$EXEMPT" || true)
          if [ -n "$REMAINING" ]; then
            echo "Unexempted vulnerabilities found: $REMAINING"
            govulncheck ./...
            exit 1
          fi
          echo "All findings are exempted via .govulnignore: $EXEMPT"

  gosec:
    name: GoSec Security Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version-file: "go.mod"
      - name: install gosec
        run: curl -sfL https://raw.githubusercontent.com/securego/gosec/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.22.11
      - name: Run Gosec Security Scanner
        run: $(go env GOPATH)/bin/gosec -exclude=G115 -severity=high -confidence=medium ./...

  trivy-go:
    name: trivy-go
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Run Trivy Go vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@master
        with:
          skip-dirs: './destination/iceberg/olake-iceberg-java-writer'
          exit-code: '1'
          scan-type: 'fs'
          scan-ref: './'
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

