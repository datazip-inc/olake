name: 2PC Integration Tests

on:
  push:
    branches:
      - "master"
    paths:
      - '**/*.go'
      - '**/*.java'
  pull_request:
    branches:
      - "*"
    paths:
      - '**/*.go'
      - '**/*.java'

jobs:
  twopc-integration-tests:
    uses: ./.github/workflows/integration-tests-runner.yml
    with:
      test_type: 2pc
